server {
    listen       80;
    server_name  SERVER_NAME_PLACEHOLDER;

    # ========== 安全防护 ==========

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~ \.env$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~ \.(bak|backup|old|orig|save|sql|tar|gz|zip)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # ========== Socket.io 服务 ==========

    location /socket.io/ {
        proxy_pass http://127.0.0.1:SOCKET_PORT_PLACEHOLDER;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
    }

    # ========== Next.js API 路由 ==========

    location /api/ {
        proxy_pass http://127.0.0.1:NEXT_PORT_PLACEHOLDER;

        proxy_read_timeout    600s;
        proxy_send_timeout    600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== Next.js 静态资源 ==========
    # 使用变量形式的 proxy_pass 防止 Nginx 对 URI 中括号等字符的解码/校验问题
    # Next.js route groups 使用括号命名如 (dashboard)，构建产物路径中包含括号

    location /_next/ {
        set $upstream http://127.0.0.1:NEXT_PORT_PLACEHOLDER;
        proxy_pass $upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ========== Next.js 前端（SSR） ==========

    location / {
        proxy_pass http://127.0.0.1:NEXT_PORT_PLACEHOLDER;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log  /var/log/nginx/claudecode.access.log;
    error_log   /var/log/nginx/claudecode.error.log;
}
